name: Daily Design Generator

on:
  schedule:
    - cron: '0 19 * * *'  # Runs daily at 1 AM Bangladesh time
  workflow_dispatch:     # Allows manual run from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout repo
    - uses: actions/checkout@v3

    # Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Install dependencies
    - name: Install dependencies
      run: |
        pip install pillow pandas pydrive

    # Create credentials.json from GitHub Secret
    - name: Create credentials.json
      run: |
        echo "${{ secrets.GOOGLE_CREDS }}" > credentials.json

    # Run the generator script
    - name: Run generator.py
      run: python generator.py
